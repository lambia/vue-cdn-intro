<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Hello Vue World</title>
	<link rel="stylesheet" href="./style.css">
	<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>

	<div id="app">
		<h1>ToDo List</h1>
		<div class="app-buttons">
			<input class="newtask-input" :class="getValidation()" v-model="newTaskTitle" placeholder="Nuova task" />
			<button :disabled="newTaskTitle.trim().length < 3" @click="addTask">Aggiungi task</button>
			<button @click="clearTasks">Svuota lista</button>
		</div>
		<div class="todo-list">
			<div v-for="todoItem of todoList">
				<p>{{ todoItem }}</p>
			</div>

			<!-- <div v-for="todoItem of todoList">
				<h2>{{ todoItem.title }}</h2>
				<p>{{ todoItem.description }}</p>
				<p>{{ todoItem.completed ? "COMPLETATO" : "NON COMPLETATO" }}</p>
			</div> -->
		</div>

	</div>
	<script src="./main.js"></script>

</body>

</html>
